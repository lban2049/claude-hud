  - title: "Architecture"
    description: "How Claude HUD works under the hood — data flow, rendering pipeline, and extension points"
    path: "/architecture"
    sourcePaths: ["src/index.ts", "src/stdin.ts", "src/transcript.ts", "CLAUDE.README.md"]
    icon: "lucide:git-branch"
  - title: "Troubleshooting"
    description: "Fix common issues with installation, display, configuration, and platform-specific quirks"
