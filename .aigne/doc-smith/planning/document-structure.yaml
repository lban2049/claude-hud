project:
  title: "Claude HUD"
  description: "Real-time statusline HUD for Claude Code — context usage, active tools, running agents, and todo progress"
documents:
  - title: "Overview"
    description: "What Claude HUD is, what it shows, and why it matters for your Claude Code workflow"
    path: "/overview"
    sourcePaths: ["README.md", "CLAUDE.README.md"]
    icon: "lucide:monitor"
  - title: "Getting Started"
    description: "Install Claude HUD and get it running in under a minute"
    path: "/getting-started"
    sourcePaths: ["README.md", "CLAUDE.README.md"]
